<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc Nghiệm Ôn Thi</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <link rel="stylesheet" href="css/shared.css">
    <script>
        const params = new URLSearchParams(window.location.search);
        const quizId = params.get('id');
        if (!quizId) {
            window.location.replace("index.html");
        } else {
            // Load file JS cố định của đề thi trước, sau đó là shared.js chung
            document.write(`<script src="js/${quizId}.js"><\/script>`);
            document.write(`<script src="js/shared.js"><\/script>`);
        }
    </script>
</head>

<body>
    <div id="particles-js"></div>
    <audio id="bg-music" loop></audio>

    <div id="start-screen">
        <a href="index.html" class="home-link">⬅ Quay về Trang Chủ</a>

        <div id="quiz-info-container">
            <!-- Nội dung tiêu đề, mô tả sẽ tự động nạp từ file js qua biến quizInfoHTML -->
        </div>

        <button id="toggle-theory-btn" class="modal-btn" style="margin-bottom: 20px; display: none; background: #3498db; color: white; cursor: pointer; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold;" onclick="toggleTheory()">📖 Xem Lý Thuyết & Phương Pháp Giải</button>
        <div id="quiz-theory-container" style="display: none; text-align: left; max-width: 800px; margin: 0 auto 20px auto; background: rgba(255,255,255,0.95); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); color: #333; line-height: 1.6;">
            <!-- Nội dung lý thuyết sẽ được nạp từ biến theoryHTML -->
        </div>

        <input type="text" id="username" class="name-input" placeholder="Nhập Họ và Tên của bạn..." autocomplete="off">
        <button class="start-btn" onclick="beginQuiz()">BẮT ĐẦU LÀM BÀI</button>
    </div>

    <div class="sticky-header" id="sticky-header">
        <div id="display-name-header" style="font-weight: bold; color: #bdc3c7;"></div>
        <button class="music-control" onclick="toggleMusic()" title="Bật/Tắt nhạc">🔊</button>
        <div> | <span id="timer" class="timer-box">00:00</span></div>
        <button class="submit-btn" id="submit-btn" style="margin-left: 20px;" onclick="submitQuiz()">NỘP BÀI</button>
    </div>

    <div class="quiz-container" id="quiz-container">
        <h2 style="text-align: center; color: #2c3e50;">ĐỀ BÀI</h2>
        <div id="quiz-content"></div>
    </div>

    <!-- PANEL ĐIỀU HƯỚNG CÂU HỎI -->
    <div id="nav-panel" style="display:none;">
        <div class="nav-panel-stats">
            <div class="nav-stat-item">
                <div class="nav-stat-label">Số câu đã làm</div>
                <div class="nav-stat-value" id="nav-answered">0/<span id="nav-total">0</span></div>
            </div>
            <div class="nav-stat-item">
                <div class="nav-stat-label">Thời gian còn lại</div>
                <div class="nav-stat-value nav-timer" id="nav-timer">00:00</div>
            </div>
        </div>
        <div class="nav-grid" id="nav-grid"></div>
        <button class="nav-submit-btn" onclick="submitQuiz()">NỘP BÀI</button>
        <div class="nav-legend">
            <div class="nav-legend-item"><span class="nav-dot nav-dot-done"></span>Câu đã làm</div>
            <div class="nav-legend-item"><span class="nav-dot nav-dot-empty"></span>Câu chưa làm</div>
            <div class="nav-legend-item"><span class="nav-dot nav-dot-review"></span>Câu cần kiểm tra lại</div>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div class="result-modal" id="resultModal">
        <h2>KẾT QUẢ BÀI THI</h2>
        <div>Thí sinh: <span class="student-name-final" id="final-name"></span></div>
        <span class="score-display" id="final-score">0/0</span>

        <img id="result-image" src="" alt="Kết quả">

        <p id="score-message" style="font-weight: bold; font-size: 1.1em; margin-top: 0;"></p>

        <button class="modal-btn btn-review" onclick="reviewQuiz()">🔍 Xem lại bài làm (Câu sai)</button>
        <button class="modal-btn btn-restart" onclick="location.reload()">↻ Làm lại bài này</button>
        <button class="modal-btn btn-home" onclick="window.location.href='index.html'">🏠 Chọn đề khác</button>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="js/particles-config.js"></script>
</body>

</html>
